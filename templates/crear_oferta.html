{% extends "base.html" %}
{% block contenido %}
<div class="contenedor-oferta">
  <h2>Publicar nueva oferta</h2>
  
  <form method="post" class="form-oferta">
    
    <div class="campo-grupo">
      <label for="titulo">Título:</label>
      <input id="titulo" name="titulo" required>
    </div>

    <div class="campo-grupo">
      <label for="descripcion">Descripción:</label>
      <textarea id="descripcion" name="descripcion" rows="5" required></textarea>
    </div>

    <div class="campo-grupo">
      <label for="requisitos">Requisitos:</label>
      <textarea id="requisitos" name="requisitos" rows="3"></textarea>
    </div>

    <div class="campo-grupo">
      <label for="ubicacion">Ubicación:</label>
      <input id="ubicacion" name="ubicacion">
    </div>

    <div class="campo-grupo">
      <label for="salario">Salario:</label>
      <input id="salario" name="salario">
    </div>

    <div class="campo-grupo">
      <label for="modalidad">Modalidad:</label>
      <select id="modalidad" name="modalidad">
        <option value="Presencial">Presencial</option>
        <option value="Remoto">Remoto</option>
        <option value="Híbrido">Híbrido</option>
      </select>
    </div>

    <button type="submit" class="btn-publicar">Publicar</button>
  </form>
</div>
{% endblock %}
