{% extends "base.html" %}
{% block contenido %}
<div class="contenedor-evaluacion">
  <h2>Evaluar Egresado</h2>
  
  <form method="post" class="form-evaluacion">
    
    <div class="campo-grupo">
      <label for="id_egresado">Egresado:</label>
      <select id="id_egresado" name="id_egresado" required>
        <option value="">Seleccionar egresado...</option>
        {% for e in egresados %}
          <option value="{{ e._id }}">{{ e.nombre }} - {{ e.carrera }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="campo-grupo">
      <label for="calificacion">Calificación final (0-10):</label>
      <input type="number" id="calificacion" step="0.1" min="0" max="10" name="calificacion" required>
    </div>

    <div class="campo-grupo">
      <label for="comp_tecnicos">Conocimientos técnicos (0-10):</label>
      <input type="number" id="comp_tecnicos" step="0.1" min="0" max="10" name="comp_tecnicos" value="0">
    </div>

    <div class="campo-grupo">
      <label for="comp_equipo">Trabajo en equipo (0-10):</label>
      <input type="number" id="comp_equipo" step="0.1" min="0" max="10" name="comp_equipo" value="0">
    </div>

    <div class="campo-grupo">
      <label for="comp_comunicacion">Comunicación (0-10):</label>
      <input type="number" id="comp_comunicacion" step="0.1" min="0" max="10" name="comp_comunicacion" value="0">
    </div>

    <div class="campo-grupo">
      <label for="comp_problemas">Resolución de problemas (0-10):</label>
      <input type="number" id="comp_problemas" step="0.1" min="0" max="10" name="comp_problemas" value="0">
    </div>

    <div class="campo-grupo">
      <label for="observaciones">Observaciones:</label>
      <textarea id="observaciones" name="observaciones" rows="4"></textarea>
    </div>

    <button type="submit" class="btn-guardar">Guardar evaluación</button>
  </form>
</div>
{% endblock %}
